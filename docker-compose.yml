name: rssmonster

services:
  rssmonster:
    image: rssmonster/rssmonster:${RSSMONSTER_TAG:-latest}
    container_name: rssmonster
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy
        restart: true

    ports:
      - "${RSSMONSTER_PORT:-3000}:3000"

    environment:
      NODE_ENV: production
      PORT: 3000

      DB_HOSTNAME: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-rssmonster}
      DB_USERNAME: ${DB_USERNAME:-rssmonster}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}

    init: true

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:3000/api/health')
          .then(response => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

    networks:
      - rssmonster-network

  mysql:
    image: mysql:8.4
    container_name: rssmonster-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-rssmonster}
      MYSQL_USER: ${DB_USERNAME:-rssmonster}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test:
        - CMD-SHELL
        - >
          mysqladmin ping
          --host=127.0.0.1
          --user=root
          --password="$${MYSQL_ROOT_PASSWORD}"
          --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

    security_opt:
      - no-new-privileges:true

    networks:
      - rssmonster-network

volumes:
  mysql-data:

networks:
  rssmonster-network:
    driver: bridge